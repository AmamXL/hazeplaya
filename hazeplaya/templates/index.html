<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAZEPLAYA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div id="yt-player"></div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-card">
    <div class="settings-header">
      <div class="settings-title">Settings</div>
      <button class="settings-close" id="settings-close">&times;</button>
    </div>
    <div class="settings-section">
      <div class="settings-label">Theme</div>
      <div class="theme-options">
        <div class="theme-option active" data-theme="burn">
          <div class="theme-preview burn"></div>
          <div class="theme-name">Burn</div>
        </div>
        <div class="theme-option" data-theme="green">
          <div class="theme-preview green"></div>
          <div class="theme-name">Green</div>
        </div>
        <div class="theme-option" data-theme="ivory">
          <div class="theme-preview ivory"></div>
          <div class="theme-name">Ivory</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Playlist Modal -->
<div class="playlist-modal-overlay" id="playlist-modal">
  <div class="playlist-modal-card">
    <div class="playlist-modal-header">
      <div class="playlist-modal-title" id="playlist-modal-title"></div>
      <button class="playlist-modal-close" id="playlist-modal-close">&times;</button>
    </div>
    <div class="playlist-modal-list" id="playlist-modal-list"></div>
  </div>
</div>

<!-- App Layout -->
<div class="app-layout">

  <!-- LEFT: Queue Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo" id="sidebar-logo" title="Settings">HAZE<span>PLAYA</span></div>
      <div class="unlock-section">
        <input class="unlock-input" id="unlock-input" type="password" placeholder="Admin" maxlength="10">
        <span class="unlock-status" id="unlock-status">LOCKED</span>
      </div>
    </div>
    <div class="queue-section-header">
      <span class="queue-label">Queue</span>
      <div class="autoplay-row">
        <span class="queue-label accent">AUTO</span>
        <label class="toggle-switch">
          <input type="checkbox" id="autoplay-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="queue-list" id="queue-list">
      <div class="queue-empty">Queue is empty</div>
    </div>
  </div>

  <!-- CENTER: Main Content -->
  <div class="main-content">
    <!-- Search Section -->
    <div class="search-section">
      <div class="search-row">
        <input type="text" class="search-input" id="search-input" placeholder="Search tracks, artists...">
        <button class="search-btn" id="search-btn">&#8981;</button>
        <div class="search-quota">
          <span id="quota-used">&mdash;</span><span class="quota-sep">/</span><span id="quota-total">&mdash;</span>
        </div>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>

    <!-- Now Playing Area with Thumbnail -->
    <div class="now-playing-area">
      <div class="now-playing-bg" id="now-playing-bg">PLAY</div>
      <div class="now-playing-content">
        <div class="logo-container">
          <svg class="logo-svg" viewBox="0 0 100 112">
            <g class="logo-ring-1">
              <circle cx="50" cy="56" r="46" fill="none" stroke="var(--theme-accent)" stroke-width="1" stroke-dasharray="4 7" opacity="0.2"/>
            </g>
            <g class="logo-ring-2">
              <circle cx="50" cy="56" r="34" fill="none" stroke="var(--theme-accent)" stroke-width="0.6" stroke-dasharray="2 9" opacity="0.2"/>
            </g>
            <path class="logo-path" d="M50,4 L94,52 L67,78 L59,70 L59,103 L50,114 L41,103 L41,70 L33,78 L6,52 Z M50,20 L21,52 L33,52 L50,37 L67,52 L79,52 Z"/>
          </svg>
          <!-- Large thumbnail overlay -->
          <img class="now-playing-thumb" id="now-playing-thumb" src="" alt="">
        </div>
        <div class="visualizer" id="visualizer"></div>
        <div class="now-playing-info">
          <div class="now-playing-label">Now Playing</div>
          <div class="now-playing-title" id="now-title">&mdash;</div>
          <div class="now-playing-artist" id="now-artist">Nothing in queue</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Playlists Panel -->
  <div class="playlists-panel">
    <div class="playlists-header">
      <span class="playlists-title">Playlists</span>
    </div>
    <div class="playlists-list" id="playlists-list"></div>
  </div>

</div>

<!-- Player Bar -->
<div class="player-bar">
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-line" id="progress-line"></div>
  </div>
  
  <div class="player-song-info">
    <div class="player-song-title" id="player-title">&mdash;</div>
    <div class="player-song-artist" id="player-artist">Nothing in queue</div>
  </div>
  
  <div class="controls-row">
    <button class="ctrl-btn" id="btn-prev" title="Previous">&#9198;</button>
    <button class="ctrl-btn play" id="btn-play" title="Play / Pause">&#9654;</button>
    <button class="ctrl-btn" id="btn-next" title="Next">&#9197;</button>
  </div>
  
  <div class="time-row">
    <span class="time-current" id="time-current">0:00</span>
    <span class="time-separator">/</span>
    <span class="time-total" id="time-total">0:00</span>
  </div>
  
  <div class="volume-row">
    <span class="vol-icon">&#9835;</span>
    <input type="range" class="volume-slider" id="volume" min="0" max="100" value="10">
    <span class="vol-pct" id="vol-pct">10%</span>
  </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">Admin access required</div>

<!-- Scripts -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/playlists.js') }}"></script>
<script src="{{ url_for('static', filename='js/player.js') }}"></script>
<script src="{{ url_for('static', filename='js/queue.js') }}"></script>
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
